name: trottersindependanttraders-tests

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /app
    entrypoint:
      - python
      - -m
      - unittest
      - discover
      - -s
      - tests
      - -v
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data:ro
      - ./extensions:/app/extensions:ro
      - ./scripts:/app/scripts:ro
      - ./src:/app/src:ro
      - ./tests:/app/tests
