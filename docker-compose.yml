x-runtime-service: &runtime-service
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /app
  restart: unless-stopped
  environment:
    TROTTERS_OPS_BRIDGE_BASE: http://ops-bridge:8891
    TROTTERS_OPS_BRIDGE_TOKEN: ${TROTTERS_OPS_BRIDGE_TOKEN}
  volumes:
    - ./configs:/app/configs:ro
    - ./data:/app/data:ro
    - ./src:/app/src:ro
    - ./runtime/catalog:/runtime/catalog
    - research_runtime:/runtime/research_runtime

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}
    restart: unless-stopped
    depends_on:
      - research-api
      - ops-bridge
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TROTTERS_API_BASE: http://research-api:8890
      TROTTERS_API_TOKEN: ${TROTTERS_API_TOKEN}
      TROTTERS_OPS_BRIDGE_TOKEN: ${TROTTERS_OPS_BRIDGE_TOKEN}
      OPENCLAW_SUPERVISOR_AUTH_SOURCE_AGENT: ${OPENCLAW_SUPERVISOR_AUTH_SOURCE_AGENT:-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XIAOMI_API_KEY: ${XIAOMI_API_KEY:-}
    volumes:
      - ./configs/openclaw:/opt/openclaw-config:ro
      - ./extensions/openclaw/trotters-runtime:/opt/openclaw-extensions/trotters-runtime:ro
      - ./scripts/openclaw:/opt/openclaw-bootstrap:ro
      - ./runtime/openclaw:/home/node/.openclaw
      - ./runtime/catalog:/runtime/catalog
      - research_runtime:/runtime/research_runtime
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT}:18789"
    command:
      [
        "sh",
        "-lc",
        "sh /opt/openclaw-bootstrap/start-openclaw.sh"
      ]
  research-api:
    <<: *runtime-service
    environment:
      TROTTERS_API_TOKEN: ${TROTTERS_API_TOKEN}
    command:
      - research-api
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --api-host
      - 0.0.0.0
      - --api-port
      - "8890"
    ports:
      - "${TROTTERS_API_BIND_HOST:-127.0.0.1}:8890:8890"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8890/readyz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - coordinator
  ops-bridge:
    <<: *runtime-service
    environment:
      TROTTERS_OPS_BRIDGE_TOKEN: ${TROTTERS_OPS_BRIDGE_TOKEN}
    command:
      - research-ops-bridge
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --runbook-file
      - /app/configs/openclaw/trotters-runbook.json
      - --ops-host
      - 0.0.0.0
      - --ops-port
      - "8891"
      - --docker-socket-path
      - /var/run/docker.sock
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data:ro
      - ./src:/app/src:ro
      - ./runtime/catalog:/runtime/catalog
      - research_runtime:/runtime/research_runtime
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8891/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - coordinator
  dashboard:
    <<: *runtime-service
    environment:
      TROTTERS_DASHBOARD_USERNAME: ${TROTTERS_DASHBOARD_USERNAME:-operator}
      TROTTERS_DASHBOARD_PASSWORD: ${TROTTERS_DASHBOARD_PASSWORD:-change-me-local-only}
    command:
      - research-dashboard
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --dashboard-host
      - 0.0.0.0
      - --dashboard-port
      - "8888"
      - --dashboard-refresh-seconds
      - "10"
    ports:
      - "${TROTTERS_DASHBOARD_BIND_HOST:-127.0.0.1}:8888:8888"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8888/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - coordinator
  coordinator:
    <<: *runtime-service
    command:
      - research-coordinator
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "2"
      - --lease-timeout-seconds
      - "900"
    healthcheck:
      test: ["CMD", "python", "-m", "trotters_trader.cli", "research-service-heartbeat-check", "--runtime-root", "/runtime/research_runtime", "--service", "coordinator", "--max-age-seconds", "30"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  campaign-manager:
    <<: *runtime-service
    command:
      - research-campaign-manager
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "15"
    healthcheck:
      test: ["CMD", "python", "-m", "trotters_trader.cli", "research-service-heartbeat-check", "--runtime-root", "/runtime/research_runtime", "--service", "campaign-manager", "--max-age-seconds", "90"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - coordinator
  research-director:
    <<: *runtime-service
    command:
      - research-director-manager
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "30"
    healthcheck:
      test: ["CMD", "python", "-m", "trotters_trader.cli", "research-service-heartbeat-check", "--runtime-root", "/runtime/research_runtime", "--service", "research-director", "--max-age-seconds", "150"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      - coordinator
      - campaign-manager
  worker:
    <<: *runtime-service
    command:
      - research-worker
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "2"
      - --lease-timeout-seconds
      - "900"
    depends_on:
      - coordinator

volumes:
  research_runtime:

