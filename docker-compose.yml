x-runtime-service: &runtime-service
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /app
  volumes:
    - ./configs:/app/configs:ro
    - ./data:/app/data:ro
    - ./src:/app/src:ro
    - ./runtime:/runtime

services:
  dashboard:
    <<: *runtime-service
    command:
      - research-dashboard
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --dashboard-host
      - 0.0.0.0
      - --dashboard-port
      - "8888"
      - --dashboard-refresh-seconds
      - "10"
    ports:
      - "8888:8888"
    depends_on:
      - coordinator
  coordinator:
    <<: *runtime-service
    command:
      - research-coordinator
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "2"
      - --lease-timeout-seconds
      - "900"
  campaign-manager:
    <<: *runtime-service
    command:
      - research-campaign-manager
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "15"
    depends_on:
      - coordinator
  research-director:
    <<: *runtime-service
    command:
      - research-director-manager
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "30"
    depends_on:
      - coordinator
      - campaign-manager
  worker:
    <<: *runtime-service
    command:
      - research-worker
      - --runtime-root
      - /runtime/research_runtime
      - --catalog-output-dir
      - /runtime/catalog
      - --poll-seconds
      - "2"
      - --lease-timeout-seconds
      - "900"
    depends_on:
      - coordinator
